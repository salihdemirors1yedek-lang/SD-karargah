<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD | BEYKOZ</title>
    <style>
        body { background-color: #050505; color: #d1d1d1; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .folder { width: 90%; max-width: 600px; background-color: #111; border: 1px solid #333; padding: 30px; position: relative; box-shadow: 0 0 50px rgba(139, 0, 0, 0.2); }
        .sd-stamp { position: absolute; top: 20px; right: 20px; border: 4px solid #8b0000; color: #8b0000; padding: 10px; font-weight: bold; font-size: 30px; transform: rotate(15deg); background: rgba(0,0,0,0.5); }
        h1 { border-bottom: 2px solid #8b0000; padding-bottom: 10px; font-size: 24px; color: #fff; }
        .info { margin: 25px 0; font-size: 16px; line-height: 1.8; }
        .label { color: #8b0000; font-weight: bold; margin-right: 8px; }
        .video-box { width: 100%; border: 2px solid #222; margin: 20px 0; background: #000; position: relative; min-height: 150px; display: flex; align-items: center; justify-content: center; }
        .cam-text { position: absolute; top: 5px; left: 5px; color: red; font-size: 10px; font-weight: bold; }
        .transcript { background: #000; padding: 15px; border-left: 4px solid #8b0000; font-style: italic; font-size: 15px; margin-top: 20px; color: #eee; }
        .footer { margin-top: 30px; font-size: 10px; color: #444; text-align: center; }
        .blink { animation: b 1s infinite; color: red; }
        @keyframes b { 50% { opacity: 0; } }
    </style>
</head>
<body onclick="start()">
    <div class="folder">
        <div class="sd-stamp">SD</div>
        <h1>SALİH DEMİRÖRZ</h1>
        <div class="info">
            <div><span class="label">BOY:</span> 1.68m</div>
            <div><span class="label">BÖLGE:</span> BEYKOZ / İSTANBUL</div>
            <div><span class="label">DURUM:</span> <span class="blink">AKTİF</span></div>
        </div>
        <div class="video-box">
            <div class="cam-text">REC ● SD-BEYKOZ</div>
            <div style="color: #444;">[ SES DOSYASI YÜKLENDİ ]</div>
        </div>
        <div class="transcript">"ÇOCUKSUNUZ LAN SİZ! ESMEYİN, KOLPA YAPMAYIN..."</div>
        <div class="footer">EKRANA DOKUNUNCA SES BAŞLAR.</div>
    </div>
    <audio id="a"><source src="ses.mp3.mp3" type="audio/mpeg"></audio>
    <script>function start(){document.getElementById('a').play();}</script>
</body>
</html>
